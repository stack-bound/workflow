name: Release

# Releases are tag-driven. Your local `clog` flow merges the changelog.d
# fragments into CHANGELOG.md, writes the new version to VERSION, and tags the
# commit. Push that tag (`git push origin vX.Y.Z`) and this workflow publishes
# the matching GitHub release. It never creates tags on its own — pushing a tag
# is the only thing that triggers it.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Derive version from the pushed tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG  Version: $VERSION"

      - name: Verify VERSION file matches the tag
        run: |
          TAG_VERSION="${{ steps.version.outputs.version }}"
          FILE_VERSION="$(tr -d ' \t\r\n' < VERSION)"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match VERSION file ($FILE_VERSION). The binary embeds VERSION, so they must agree. Re-tag the commit that bumps VERSION to $TAG_VERSION."
            exit 1
          fi

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Print the block under "## [VERSION]" up to the next "## [" entry or
          # the trailing "# Notes" footer.
          awk -v ver="$VERSION" '
            /^## \[/ { if (found) exit; if (index($0, "## [" ver "]")) found=1 }
            found && /^# / { exit }
            found { print }
          ' CHANGELOG.md > /tmp/RELEASE_NOTES.md
          if [ ! -s /tmp/RELEASE_NOTES.md ]; then
            echo "::error::No CHANGELOG.md entry found for version $VERSION (expected a '## [$VERSION]' heading)"
            exit 1
          fi
          echo "----- release notes -----"
          cat /tmp/RELEASE_NOTES.md

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --release-notes=/tmp/RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
