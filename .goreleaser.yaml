version: 2

builds:
  - main: ./cmd/wf
    binary: wf
    flags:
      # Disable Go's VCS stamping so release binaries carry no commit metadata.
      # version.go treats a stamped commit as a local "-dev" build; omitting it
      # here makes Version() return the bare VERSION value for releases.
      - -buildvcs=false
    env:
      - CGO_ENABLED=0
    ldflags:
      # Version is embedded from the VERSION file (see version.go), so no -X
      # injection is needed here — just strip the binary.
      - -s -w
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "wf_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: stack-bound
    name: workflow
